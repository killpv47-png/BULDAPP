name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. دریافت کدها
        uses: actions/checkout@v4

      - name: 2. نصب Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 2.5. ایجاد پوشه‌های ضروری (android و...)
        run: flutter create --platforms android .

      - name: 3. دریافت کتابخونه‌های مورد نیاز
        run: flutter pub get

      - name: 4. ساخت فایل نصبی (APK)
        run: flutter build apk --debug

      - name: 5. آپلود فایل APK برای دانلود
        uses: actions/upload-artifact@v4
        with:
          name: gate-app
          path: build/app/outputs/flutter-apk/app-debug.apk
