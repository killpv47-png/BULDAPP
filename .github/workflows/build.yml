name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. دریافت کدها
        uses: actions/checkout@v4

      - name: 2. نصب Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 2.5. ایجاد پوشه‌های ضروری (android و...)
        run: flutter create --platforms android .

      - name: 3. دریافت کتابخونه‌های مورد نیاز
        run: flutter pub get

      - name: 4. ساخت فایل نصبی (APK)
        run: flutter build apk --debug

      - name: 5. ارسال فایل APK به ربات تلگرام
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          echo "📤 در حال ارسال فایل به تلگرام..."
          curl -F "document=@${APK_PATH}" -F "chat_id=${CHAT_ID}" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          echo "✅ فایل با موفقیت ارسال شد."
