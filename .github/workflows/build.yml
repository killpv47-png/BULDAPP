name: Build APK & Telegram Wake

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. دریافت کدها
        uses: actions/checkout@v4

      - name: 2. نصب Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 2.5. ایجاد پوشه‌های ضروری
        run: flutter create --platforms android .

      - name: 3. دریافت کتابخونه‌های مورد نیاز
        run: flutter pub get

      - name: 4. ساخت فایل نصبی (APK)
        run: flutter build apk --debug

      - name: 5. ارسال فایل APK به ربات تلگرام
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          echo "📤 در حال ارسال فایل به تلگرام..."
          curl -F "document=@${APK_PATH}" -F "chat_id=${CHAT_ID}" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          echo "✅ فایل ارسال شد."

      - name: 6. بیدار ماندن ربات برای ۱۰ دقیقه (پاسخ به /start)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          END_TIME=$(( $(date +%s) + 600 ))  # 600 ثانیه = 10 دقیقه
          OFFSET=0

          echo "⏰ ربات تا ۱۰ دقیقه دیگر بیدار می‌ماند..."

          while [ $(date +%s) -lt $END_TIME ]; do
            # دریافت پیام‌های جدید
            UPDATES=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=$OFFSET&timeout=5")
            
            # استخراج chat_id و متن پیام‌هایی که /start فرستاده‌اند
            echo "$UPDATES" | jq -r '.result[] | select(.message.text=="/start") | 
              "\(.update_id) \(.message.chat.id)"' | while read UPDATE_ID CHAT_ID; do
              echo "🔔 دریافت /start از $CHAT_ID"
              # ارسال فایل
              curl -F "document=@${APK_PATH}" -F "chat_id=${CHAT_ID}" \
                   "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
              # به‌روزرسانی offset برای تایید دریافت پیام
              OFFSET=$((UPDATE_ID + 1))
            done

            # اگر آفست جدیدی از حلقه داخلی داریم، اعمال کن
            if [ -n "$OFFSET" ]; then
              # فقط کافیه offset آخرین پیام رو تنظیم کنیم
              : # این کار توی حلقه انجام شده
            fi

            sleep 10  # هر ۱۰ ثانیه چک کن
          done

          echo "😴 ربات به حالت خواب فرو رفت. برای بیدار شدن دوباره workflow را اجرا کنید."
