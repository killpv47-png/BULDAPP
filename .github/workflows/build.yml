name: Build APK & Telegram Wake (Python)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. دریافت کدها
        uses: actions/checkout@v4

      - name: 2. نصب Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 2.5. ایجاد پوشه‌های ضروری
        run: flutter create --platforms android .

      - name: 3. دریافت کتابخونه‌های مورد نیاز
        run: flutter pub get

      - name: 4. ساخت فایل نصبی (APK)
        run: flutter build apk --debug

      - name: 5. ارسال و بیدار ماندن ۱۰ دقیقه (پایتون)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << ENDPYTHON
          import requests, time, os, sys

          BOT_TOKEN = os.environ['BOT_TOKEN']
          YOUR_CHAT_ID = os.environ['CHAT_ID']
          APK_PATH = "build/app/outputs/flutter-apk/app-debug.apk"
          BASE_URL = f"https://api.telegram.org/bot{BOT_TOKEN}"

          # ---- تابع ارسال فایل ----
          def send_apk(chat_id):
              url = f"{BASE_URL}/sendDocument"
              with open(APK_PATH, 'rb') as f:
                  files = {'document': f}
                  data = {'chat_id': chat_id}
                  r = requests.post(url, files=files, data=data)
              return r.json()

          # ---- 1. ارسال اولیه به خودمون ----
          print("📤 ارسال فایل اولیه به خودت...")
          resp = send_apk(YOUR_CHAT_ID)
          if resp.get('ok'):
              print("✅ فایل با موفقیت ارسال شد.")
          else:
              print("❌ خطا در ارسال اولیه:", resp)
              sys.exit(1)

          # ---- 2. بیدار ماندن ۱۰ دقیقه و پاسخ به /start ----
          END_TIME = time.time() + 600  # 10 دقیقه
          last_update_id = -1

          print("⏰ ربات برای ۱۰ دقیقه بیدار می‌ماند. برای دریافت فایل /start بزنید.")
          while time.time() < END_TIME:
              # دریافت پیام‌های جدید
              url = f"{BASE_URL}/getUpdates?timeout=5&offset={last_update_id + 1}"
              try:
                  updates = requests.get(url).json()
              except Exception as e:
                  print("⚠️ خطا در دریافت به‌روزرسانی:", e)
                  time.sleep(2)
                  continue

              if updates.get('result'):
                  for upd in updates['result']:
                      last_update_id = upd['update_id']
                      msg = upd.get('message')
                      if msg and msg.get('text') == '/start':
                          chat_id = str(msg['chat']['id'])
                          print(f"🔔 دستور /start از {chat_id} دریافت شد. ارسال فایل...")
                          send_apk(chat_id)

              time.sleep(3)

          print("😴 ۱۰ دقیقه تمام شد. ربات به خواب رفت.")
          ENDPYTHON
